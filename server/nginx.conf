# ============================================================
# AIF Chat - Nginx 配置示例
# ============================================================
# 将此文件放入 /etc/nginx/sites-available/ 并创建软链接到 sites-enabled/
# ln -s /etc/nginx/sites-available/aifchat.conf /etc/nginx/sites-enabled/
# ============================================================

server {
    listen 80;
    server_name your-domain.com www.your-domain.com;
    
    # 强制 HTTPS（如果有证书）
    # return 301 https://$host$request_uri;
    # }

# server {
    # listen 443 ssl http2;
    # server_name your-domain.com www.your-domain.com;
    
    # SSL 证书配置
    # ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
    # ssl_protocols TLSv1.2 TLSv1.3;
    # ssl_ciphers HIGH:!aNULL:!MD5;
    
    root /var/www/aifchat/server;
    index app_api.php;
    
    charset utf-8;
    client_max_body_size 20M;
    
    # 日志
    access_log /var/log/nginx/aifchat-access.log;
    error_log  /var/log/nginx/aifchat-error.log;
    
    # 安全头
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy no-referrer;
    
    # 禁止访问敏感文件
    location ~ /\. {
        deny all;
    }
    
    location ~ \.(env|sql|md|log|lock)$ {
        deny all;
    }
    
    location ~ /includes/ {
        deny all;
    }
    
    location ~ /cache/ {
        deny all;
    }
    
    location ~ /logs/ {
        deny all;
    }
    
    location ~ /vendor/ {
        deny all;
    }
    
    # 静态资源缓存
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|ttf|woff|woff2)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
    
    # PHP 处理
    location ~ \.php$ {
        fastcgi_pass unix:/var/run/php/php8.1-fpm.sock;
        # 或者 TCP: fastcgi_pass 127.0.0.1:9000;
        
        fastcgi_index app_api.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        
        include fastcgi_params;
        
        # PHP-FPM 调优
        fastcgi_buffer_size 128k;
        fastcgi_buffers 4 256k;
        fastcgi_busy_buffers_size 256k;
        fastcgi_read_timeout 300;
        fastcgi_send_timeout 300;
        
        # SSE 支持（禁止缓冲）
        fastcgi_buffering off;
        fastcgi_cache off;
    }
    
    # 根路径 → app_api.php
    location / {
        try_files $uri $uri/ /app_api.php?$query_string;
    }
    
    # 健康检查端点（不记录日志）
    location /health {
        access_log off;
        try_files $uri /app_api.php?action=health;
    }
}
